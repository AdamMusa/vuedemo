<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="30">
  <title>Maintenance in progress</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: #0e1116; color: #e6e8eb;
           font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .card { max-width: 560px; padding: 48px 40px; text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px;
             background: #1a212c; color: #8b949e; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e3b341; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .35 } }
    h1 { font-size: 28px; margin: 24px 0 12px; font-weight: 650; color: #fff; }
    .message { font-size: 16px; line-height: 1.6; color: #9da7b3; margin: 0; }
    .footer { margin-top: 40px; font-size: 13px; color: #586069; }
    .footer a { color: #8b949e; text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span> Maintenance in progress</span>
    <h1>We&rsquo;ll be right back</h1>
    <p class="message">{{ if .Message }}{{ .Message }}{{ else }}Scheduled maintenance is under way. Please check back shortly.{{ end }}</p>
    <div class="footer">Powered by <a href="https://alkimist.dev">Alkimist</a></div>
  </main>
</body>
</html>
